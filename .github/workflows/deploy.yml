name: Deploy VSF Match to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
        env:
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_JOOBLE_API_KEY: ${{ secrets.VITE_JOOBLE_API_KEY }}
      - name: Rename HTML output for deployment
        run: mv dist/index.src.html dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Commit built root files
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update built assets [skip ci]"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
